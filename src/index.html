<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive web application where users can manage their profile information, create posts, and upload or remove images with seamless form validation and enhanced user experience."
    />
    <meta name="author" content="Maria Cranford" />
    <meta
      name="keywords"
      content="web developer, HTML, CSS, JavaScript, portfolio"
    />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img alt="Spot logo" src="" class="header__logo-image" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__pic">
            <img src="" alt="Profile Picture" class="profile__picture" />
            <button type="button" class="profile__avatar-btn">
             <img
             class="profile__pencil__light"
             src="<%=require('./images/pencil__light.png')%>"
             alt="Pencil icon"
             />
            </button>
               <img
                src=""
                alt="Bessie Coleman"
                class="profile__editavatar"
              />
          </div>
          <div class="profile__content">
            <h1 class="profile__name">Bessie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>
            <button type="button" class="profile__edit-profile-button">
              Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-button">
            <img src="" alt="Plus Sign" class="plus plus-sign" />
            New Post
          </button>
        </section>
        <section class="cards">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <img
                  alt=""
                  class="card__image"
                  src=""
                />
                <div class="card__content">
                  <h3 class="card__title"></h3>
                  <button type="button" class="card__like-button"></button>
                  <button type="button" class="card__delete-button"></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer">2023 &copy; Spots</footer>
    </div>
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">Edit profile</h2>
        <form class="modal__form" name="edit-profile-form">
          <label for="profile-name-input" class="modal__label">
            Name
            <input
              id="profile-name-input"
              type="text"
              class="modal__input"
              placeholder="Type your name"
              minlength="2"
              maxlength="40"
              required
            />
            <span id="profile-name-input-error" class="modal__error"></span>
          </label>
          <label for="profile-description-input" class="modal__label">
            Description
            <input
              id="profile-description-input"
              type="text"
              class="modal__input"
              placeholder="Describe yourself"
              minlength="2"
              maxlength="200"
              required
            />
            <span id="profile-description-input-error"></span>
            <span class="modal__error"></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="edit-avatar-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">Change profile picture</h2>
        <form class="modal__form" name="edit-avatar-form">
          <label for="profile-avatar-input" class="modal__label">
            Avatar URL
            <input
              id="profile-avatar-input"
              type="url"
              class="modal__input"
              placeholder="Paste an image link"
              required
            />
            <span id="profile-avatar-input-error" class="modal__error"></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="new-post-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">New Post</h2>
        <form class="modal__form" name="new-post-form">
          <label for="card-image-input" class="modal__label">
            Image Link
            <input
              id="card-image-input"
              type="url"
              class="modal__input"
              placeholder="Paste a link to the picture"
              required
            />
            <span id="card-image-input-error"></span>
            <span class="modal__error"></span>
          </label>
          <label for="card-caption-input" class="modal__label">
            Caption
            <input
              id="card-caption-input"
              type="text"
              class="modal__input"
              placeholder="Type your caption"
              minlength="2"
              maxlength="30"
              required
            />
            <span id="card-caption-input-error"></span>
            <span class="modal__error"></span>
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="preview-image-modal">
      <div class="modal__container modal__container_type_preview">
        <button
          type="button"
          class="modal__close-btn modal__close-btn_type_preview"
        ></button>
        <img
          alt=""
          class="modal__image"
          src=""
        />
        <p class="modal__caption"></p>
      </div>
    </div>
    <div class="modal" id="delete-popup-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
      <h2 class="modal__title">Are you sure you want to delete the image?</h2>
      <div class="modal-buttons">
        <button class="modal__button" type=button>Delete</button>
        <button class="modal__button" type=button>Cancel</button>
      </div>
      </div>
    </div>
  </body>
</html>
